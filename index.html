    <title>Chips Bizarres</title>
    <link rel="icon" href="img.jpg">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->

<!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
<header>
    <div class="header-inner">
        <img class="header-icon" src="img.jpg" alt="Logo chips">
        <div>
            <h1>Les Chips aux Formes Bizarres</h1>
            <p class="header-subtitle">
                <i class="fa-solid fa-star"></i>
                Une collection unique de chips aux formes insolites
                <i class="fa-solid fa-star"></i>
            </p>
        </div>
    </div>

    <!-- Barre d'outils -->
    <div class="toolbar">
        <!-- Recherche -->
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="search" id="search" placeholder="Rechercher une chips...">
        </div>

        <!-- Tri -->
        <div class="sort-wrap">
            <i class="fa-solid fa-arrow-up-wide-short"></i>
            <select id="sort-select">
                <option value="asc">Numéro croissant</option>
                <option value="desc">Numéro décroissant</option>
                <option value="random">Aléatoire</option>
            </select>
        </div>

        <!-- Vue grille / liste -->
        <div class="view-btns">
            <button id="btn-grid" class="view-btn active" title="Vue grille">
                <i class="fa-solid fa-grip"></i>
            </button>
            <button id="btn-list" class="view-btn" title="Vue liste">
                <i class="fa-solid fa-list"></i>
            </button>
        </div>
    </div>

    <!-- Badge compteur -->
    <span class="chip-count" id="chip-count">
        <i class="fa-solid fa-layer-group"></i> — chips
    </span>
</header>
